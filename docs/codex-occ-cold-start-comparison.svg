<svg xmlns="http://www.w3.org/2000/svg" width="980" height="590" viewBox="0 0 980 590" role="img" aria-labelledby="title desc">
  <title id="title">Codex and OpenCodeCommit cold-start comparison</title>
  <desc id="desc">Grouped bar chart comparing old and new median e2e wall times in milliseconds. Lower is better.</desc>
  <rect width="980" height="590" fill="#f8faf9"/>
