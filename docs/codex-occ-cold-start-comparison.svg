  <text x="36" y="72" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4f5f5b">Median wall time in milliseconds, 9-11 offline fixture runs, lower is better.</text>

  <rect x="36" y="96" width="14" height="14" fill="#7a8797" rx="2"/>
  <text x="58" y="108" font-family="Inter, Arial, sans-serif" font-size="13" fill="#35413f">Old baseline</text>
