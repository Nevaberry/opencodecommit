name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  ts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - working-directory: extension
        run: bun install --frozen-lockfile
      - run: bun test extension/src/test/inline.test.ts

  cross-compile:
    needs: [rust-test, ts-test]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }} -p opencodecommit
      - name: Copy binary to npm platforms dir
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          cp target/${{ matrix.target }}/release/opencodecommit${EXT} npm/opencodecommit/platforms/${{ matrix.platform }}/
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: npm/opencodecommit/platforms/${{ matrix.platform }}/opencodecommit*
