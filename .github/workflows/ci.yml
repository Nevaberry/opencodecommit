name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  ts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - working-directory: extension
        run: bun install --frozen-lockfile
      - run: bunx tsc -p extension/tsconfig.json --noEmit
      - run: bun test extension/src/test/inline.test.ts extension/src/test/config.test.ts extension/src/test/api.test.ts
