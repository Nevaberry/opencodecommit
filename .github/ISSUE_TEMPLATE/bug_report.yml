name: Bug report
description: Report a reproducible OpenCodeCommit problem.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps to reproduce with placeholder data.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - TUI
        - VS Code extension
        - VSCodium extension
        - GitHub Action / CI
        - Scanner
        - Packaging / install
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "occ --version or extension version"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs with secrets redacted.
      render: text
