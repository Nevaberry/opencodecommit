trigger: none

pr:
  branches:
    include:
      - master

parameters:
  - name: continueOnBlockingFindings
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0

  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"

  - script: npm install -g opencodecommit@latest
    displayName: Install OpenCodeCommit

  - script: |
      set +e
      occ scan --enforcement block-high --format sarif --output "$(Build.SourcesDirectory)/occ-scan.sarif"
      scan_exit_code=$?
      echo "##vso[task.setvariable variable=OCC_SCAN_EXIT_CODE]$scan_exit_code"
      occ scan --enforcement block-high --format text || true
      exit 0
    displayName: Run occ scan

  - publish: $(Build.SourcesDirectory)/occ-scan.sarif
    artifact: occ-scan
    condition: always()

  - script: |
      if [ "$(OCC_SCAN_EXIT_CODE)" = "2" ] && [ "${{ parameters.continueOnBlockingFindings }}" != "true" ]; then
        echo "OpenCodeCommit detected blocking sensitive findings."
        exit 1
      fi
    displayName: Enforce occ scan result
    condition: always()
